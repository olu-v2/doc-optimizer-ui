name: Deploy Lambda

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   env:
  #     JWT_SECRET: ${{ secrets.JWT_SECRET}}
  #     DATABASE_URI: ${{ secrets.DATABASE_URI }}
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 1

  #     - name: Set up Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 22
  #         cache: "yarn"
  #     - name: Install dependencies
  #       run: yarn install --frozen-lockfile
  #     - name: Run Jest tests
  #       run: yarn test --coverage
  #     - name: Delete Jest Coverage Folder
  #       run: |
  #         rm -rf coverage
  deploy:
    runs-on: ubuntu-latest
    # needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      # You only need to install dependencies once
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Run ESLint for static code analysis
      # - name: Run ESLint
      #   run: yarn lint

      # Fail the build if high-severity vulnerabilities exist
      # - name: Security Audit
      #   run: yarn audit --level high

      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_API_BASE_URL=${{ secrets.JWT_SECRET}}
          VITE_API_KEY=${{ secrets.DATABASE_URI }}
          VITE_BLOCKCHAIN_BASE_URL=${{ secrets.VITE_BLOCKCHAIN_BASE_URL }}
          VITE_BLOCKCHAIN_API_KEY=${{ secrets.VITE_BLOCKCHAIN_API_KEY }}
          VITE_VT_API_KEY=${{ secrets.VITE_VT_API_KEY }}
          PORT=3000
          EOF

      - name: Build Vite app
        run: yarn build

      - name: Zip Lambda function
        run: |
          # Create zip including handler, assets, source, and deps
          zip -r function.zip app.js node_modules package.json dist

      - name: Deploy Lambda using AWS SDK
        id: lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          LAMBDA_FUNCTION_NAME: pr-${{ github.event.number }}
        run: node scripts/deploy-lambda.js
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = `${{ steps.lambda.outputs.function_url }}`;
            github.rest.issues.createComment({
              issue_number: ${{ github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Deployed Preview URL: ${previewUrl}`
            })
